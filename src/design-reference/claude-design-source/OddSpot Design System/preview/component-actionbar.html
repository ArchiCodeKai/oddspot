<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Swipe action bar</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--background); }
  body {
    color: var(--foreground);
    padding: 24px;
    box-sizing: border-box;
    font-family: var(--font-brand);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .bar {
    display: flex;
    align-items: center;
    justify-content: space-around;
    gap: 28px;
    padding: 12px 20px;
    background: rgba(9, 19, 16, 0.9);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(0, 229, 204, 0.18);
    border-radius: 2px;
    box-shadow: 0 0 24px rgba(0, 229, 204, 0.1);
  }
  .fab {
    width: 52px;
    height: 52px;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--panel-light);
    border: 1px solid var(--line-strong);
    color: var(--muted);
    cursor: pointer;
  }
  .fab.skip { color: #9ca3af; }
  .fab.trip { color: var(--accent); background: rgba(0,229,204,0.08); border-color: rgba(0,229,204,0.4); box-shadow: 0 0 12px rgba(0,229,204,0.2); }
  .fab.save { color: #ec4899; }
</style>
</head>
<body>
  <div class="bar">
    <div class="fab skip" title="skip">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
    <div class="fab trip" title="add to trip">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </div>
    <div class="fab save" title="save">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7-4.5-9.5-9A5.5 5.5 0 0 1 12 6a5.5 5.5 0 0 1 9.5 6C19 16.5 12 21 12 21z"/></svg>
    </div>
  </div>
</body>
</html>
