<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Wordmark lockup</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--background); }
  body {
    color: var(--foreground);
    padding: 24px;
    box-sizing: border-box;
    font-family: var(--font-brand);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .lockup {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .lockup img {
    width: 56px;
    height: 56px;
    border-radius: 12px;
  }
  .lockup .word {
    font-weight: 700;
    font-size: 32px;
    letter-spacing: -0.04em;
    line-height: 1;
    text-shadow: 0 0 40px rgba(0, 229, 204, 0.3);
  }
  .lockup .word b {
    color: var(--accent);
  }
  .tagline {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .stack { display: flex; flex-direction: column; }
</style>
</head>
<body>
  <div class="lockup">
    <img src="../assets/logos/oddspot-icon-dark-open.svg">
    <div class="stack">
      <span class="word">Odd<b>Spot</b></span>
      <span class="tagline">B-Grade Spot Explorer</span>
    </div>
  </div>
</body>
</html>
