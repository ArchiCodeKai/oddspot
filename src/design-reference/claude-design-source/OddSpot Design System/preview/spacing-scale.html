<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--background); }
  body {
    color: var(--foreground);
    padding: 20px;
    font-family: var(--font-brand);
    box-sizing: border-box;
    display: grid;
    gap: 6px;
  }
  .row {
    display: grid;
    grid-template-columns: 40px auto 1fr;
    align-items: center;
    gap: 14px;
  }
  .tag {
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .px {
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.04em;
    min-width: 40px;
  }
  .bar {
    height: 10px;
    background: var(--accent);
    border-radius: 2px;
    opacity: 0.85;
  }
</style>
</head>
<body>
  <div class="row"><span class="tag">1</span><span class="px">4px</span><div class="bar" style="width:4px;"></div></div>
  <div class="row"><span class="tag">2</span><span class="px">8px</span><div class="bar" style="width:8px;"></div></div>
  <div class="row"><span class="tag">3</span><span class="px">12px</span><div class="bar" style="width:12px;"></div></div>
  <div class="row"><span class="tag">4</span><span class="px">16px</span><div class="bar" style="width:16px;"></div></div>
  <div class="row"><span class="tag">5</span><span class="px">20px</span><div class="bar" style="width:20px;"></div></div>
  <div class="row"><span class="tag">6</span><span class="px">24px</span><div class="bar" style="width:24px;"></div></div>
  <div class="row"><span class="tag">8</span><span class="px">32px</span><div class="bar" style="width:32px;"></div></div>
  <div class="row"><span class="tag">12</span><span class="px">48px</span><div class="bar" style="width:48px;"></div></div>
</body>
</html>
