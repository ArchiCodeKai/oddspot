<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tab bar</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--background); }
  body {
    color: var(--foreground);
    padding: 30px;
    box-sizing: border-box;
    font-family: var(--font-brand);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .tabs {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    width: 380px;
    background: rgba(9, 19, 16, 0.9);
    backdrop-filter: blur(18px);
    border-top: 1px solid rgba(0, 229, 204, 0.18);
  }
  .tab {
    padding: 10px 0 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    color: var(--muted);
    position: relative;
  }
  .tab.active { color: var(--accent); }
  .tab.active::before {
    content: "";
    position: absolute;
    top: 0;
    width: 40px;
    height: 1px;
    background: var(--accent);
    box-shadow: 0 0 8px rgba(0,229,204,0.7);
  }
  .tab .lbl {
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="tabs">
    <div class="tab active">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 8 3 16 6 23 3 23 18 16 21 8 18 1 21"/><line x1="8" y1="3" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="21"/></svg>
      <span class="lbl">Map</span>
    </div>
    <div class="tab">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
      <span class="lbl">Swipe</span>
    </div>
    <div class="tab">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <span class="lbl">Submit</span>
    </div>
  </div>
</body>
</html>
