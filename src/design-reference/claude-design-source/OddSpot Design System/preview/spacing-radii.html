<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--background); }
  body {
    color: var(--foreground);
    padding: 20px;
    font-family: var(--font-brand);
    box-sizing: border-box;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    align-items: end;
  }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: var(--panel);
    border: 1px solid var(--line-strong);
  }
  .tag {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--muted);
  }
  .val {
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
  <div class="cell"><div class="box" style="border-radius:2px;"></div><span class="tag">xs</span><span class="val">2px</span></div>
  <div class="cell"><div class="box" style="border-radius:8px;"></div><span class="tag">sm</span><span class="val">8px</span></div>
  <div class="cell"><div class="box" style="border-radius:14px;"></div><span class="tag">md</span><span class="val">14px</span></div>
  <div class="cell"><div class="box" style="border-radius:20px;"></div><span class="tag">lg</span><span class="val">20px</span></div>
  <div class="cell"><div class="box" style="border-radius:24px;"></div><span class="tag">xl</span><span class="val">24px</span></div>
</body>
</html>
